<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeBank - Admin Registration</title>
    <link rel="stylesheet" href="loginStyles.css">
</head>
<body class="login-page">
<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
           <img src="../assets/images/PrimeBankBlueLogoWhiteBackground.png" alt="Primebank logo" class="login-img">
        </div>
        <form class="login-form" onsubmit="handleAdminSignup(event)">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="Your full name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="Your work email" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="Your phone number">
            </div>
            <div class="form-group">
                <label>Employee ID</label>
                <input type="text" id="employeeId" placeholder="Assigned Employee ID (e.g. EMP001)" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create password (min 6 chars)" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm password" required>
            </div>
            <button type="submit" class="login-btn-primary">Register as Employee</button>
        </form>
        <div class="login-footer">
            <p>Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>
</div>
<script>
const API = 'http://localhost:5000/api';
async function handleAdminSignup(event) {
    event.preventDefault();
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
    const employeeId = document.getElementById('employeeId').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;
    if (password !== confirmPassword) { alert('Passwords do not match'); return; }
    if (password.length < 6) { alert('Password must be at least 6 characters'); return; }
    try {
        const r = await fetch(API + '/auth/register-admin', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ fullName: name, email, phone, password, employeeId })
        });
        const d = await r.json();
        if (r.ok) {
            alert('Employee account created! You can now log in with your Employee ID.');
            window.location.href = 'login.html';
        } else { alert(d.message || d.error || 'Registration failed'); }
    } catch { alert('Server error'); }
}
</script>
</body>
</html>
