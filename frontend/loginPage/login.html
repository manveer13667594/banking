<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrimeBank - Login</title>
    <link rel="stylesheet" href="loginStyles.css">
    <style>
        /* Toggle switch for Customer / Employee login */
        .login-type-toggle {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.75rem;
        }
        .toggle-pill {
            display: flex;
            background: #f3f4f6;
            border: 2px solid #1f2937;
            border-radius: 999px;
            overflow: hidden;
            cursor: pointer;
            user-select: none;
        }
        .toggle-pill span {
            padding: .5rem 1.5rem;
            font-weight: 600;
            font-size: .9rem;
            font-family: Georgia, serif;
            border-radius: 999px;
            transition: background .2s, color .2s;
            color: #1f2937;
        }
        .toggle-pill span.active {
            background: #1f2937;
            color: white;
        }
        /* Employee fields */
        #employee-fields { display: none; }
        .signup-toggle { text-align:center; margin-top:.75rem; font-size:.85rem; color:#6b7280; }
        .signup-toggle a { color: #1e40af; text-decoration: none; font-weight:600; }
    </style>
</head>
<body class="login-page">
<div class="login-container">
    <div class="login-card">
        <div class="login-logo">
            <img src="../assets/images/PrimeBankBlueLogoWhiteBackground.png" alt="Primebank logo" class="login-img">
        </div>

        <!-- Toggle: Customer | Employee -->
        <div class="login-type-toggle">
            <div class="toggle-pill" id="login-toggle">
                <span id="toggle-customer" class="active" onclick="setLoginType('customer')">Customer Login</span>
                <span id="toggle-employee" onclick="setLoginType('employee')">Employee Login</span>
            </div>
        </div>

        <form class="login-form" onsubmit="handleLogin(event)">
            <!-- Customer fields -->
            <div id="customer-fields">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email">
                </div>
            </div>
            <!-- Employee field -->
            <div id="employee-fields">
                <div class="form-group">
                    <label for="employee-id">Employee ID</label>
                    <input type="text" id="employee-id" name="employeeId" placeholder="Enter your Employee ID">
                </div>
            </div>
            <!-- Shared -->
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>
            <div class="form-options">
                <label class="remember-me"><input type="checkbox" name="remember"> Remember me</label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>
            <button type="submit" class="login-btn-primary" id="login-btn">Login</button>
        </form>

        <div class="login-footer">
            <p>Don't have an account? <a href="openAccount.html">Open Account</a></p>
            <div class="signup-toggle">Admin? <a href="adminSignup.html">Register as Employee</a></div>
        </div>
    </div>
</div>
<script src="loginScript.js"></script>
</body>
</html>
