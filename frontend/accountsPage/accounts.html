<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accounts - PrimeBank</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="dashboard-page">
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                   <img src="../assets/images/PrimeBankWhiteLogoBlueBackground.png" alt="PrimeBank Logo" class="logo-image">
                </div>
            </div>

            <nav class="sidebar-menu">
                <a href="../dashboardPage/dashboard.html" class="menu-item" data-page="dashboard">
                    <span class="menu-icon">🏠</span>
                    <span>Dashboard</span>
                </a>
                <a href="accounts.html" class="menu-item active" data-page="accounts">
                    <span class="menu-icon">👤</span>
                    <span>Accounts</span>
                </a>
                <a href="../transactionPage/transactions.html" class="menu-item" data-page="transactions">
                    <span class="menu-icon">✓</span>
                    <span>Transactions</span>
                </a>
                <a href="../transferPage/transfer.html" class="menu-item" data-page="transfer">
                    <span class="menu-icon">→</span>
                    <span>Transfer Money</span>
                </a>
                <a href="../cardsPage/cards.html" class="menu-item" data-page="cards">
                    <span class="menu-icon">💳</span>
                    <span>Cards</span>
                </a>
                <a href="../loansPage/loans.html" class="menu-item" data-page="loans">
                    <span class="menu-icon">📋</span>
                    <span>Loans</span>
                </a>
                <a href="../profilePage/profile.html" class="menu-item" data-page="profile">
                    <span class="menu-icon">👥</span>
                    <span>Profile</span>
                </a>
                <a href="../supportPage/support.html" class="menu-item" data-page="support">
                    <span class="menu-icon">❓</span>
                    <span>Support</span>
                </a>
                <a href="#" class="menu-item" onclick="handleLogout()">
                    <span class="menu-icon">🚪</span>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="dashboard-header">
                <div class="header-left">
                    <h1>My Accounts</h1>
                </div>
                <div class="header-right">
                    <div class="header-icons">
                        <button class="icon-btn" title="Notifications">🔔</button>
                        <button class="icon-btn" title="Messages">✓</button>
                        <button class="icon-btn" title="Settings">⚙️</button>
                        <button class="icon-btn" title="Calendar">📅</button>
                    </div>
                </div>
            </header>

            <!-- Accounts Content -->
            <div class="content-wrapper">
                <!-- Accounts List (will be filled dynamically) -->
                <section id="accounts-list" class="accounts-detailed">
                    <!-- cards get injected here by JavaScript -->
                </section>

                <!-- Add New Account Section -->
                <section class="add-account-section">
                    <h3>Want to add a new account?</h3>
                    <button class="btn-primary" onclick="handleAddNewAccount()">+ Open New Account</button>
                </section>
            </div>
        </main>
    </div>

    <script src="../logicFile.js"></script>
</body>
</html>
