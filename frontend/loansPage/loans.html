<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loans - BankName</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body class="dashboard-page">
<div class="dashboard-container">
    <aside class="sidebar">
        <div class="sidebar-header"><div class="logo">
            <svg class="logo-icon" viewBox="0 0 40 40"><polygon points="20,5 35,15 35,25 20,35 5,25 5,15" fill="white"/></svg>
            <span>BankName</span>
        </div></div>
        <nav class="sidebar-menu">
            <a href="../dashboardPage/dashboard.html" class="menu-item"><span class="menu-icon">🏠</span><span>Dashboard</span></a>
            <a href="../accountsPage/accounts.html" class="menu-item"><span class="menu-icon">👤</span><span>Accounts</span></a>
            <a href="../transactionPage/transactions.html" class="menu-item"><span class="menu-icon">✓</span><span>Transactions</span></a>
            <a href="../transferPage/transfer.html" class="menu-item"><span class="menu-icon">→</span><span>Transfer Money</span></a>
            <a href="../cardsPage/cards.html" class="menu-item"><span class="menu-icon">💳</span><span>Cards</span></a>
            <a href="loans.html" class="menu-item active"><span class="menu-icon">📋</span><span>Loans</span></a>
            <a href="../profilePage/profile.html" class="menu-item"><span class="menu-icon">👥</span><span>Profile</span></a>
            <a href="../supportPage/support.html" class="menu-item"><span class="menu-icon">❓</span><span>Support</span></a>
            <a href="#" class="menu-item" onclick="handleLogout()"><span class="menu-icon">🚪</span><span>Logout</span></a>
        </nav>
    </aside>
    <main class="main-content">
        <header class="dashboard-header">
            <div class="header-left"><h1>Loans</h1></div>
            <div class="header-right">
                <div class="header-icons">
                    <button class="icon-btn">🔔</button><button class="icon-btn">⚙️</button>
                </div>
                <button class="btn-primary" onclick="showApplyLoanForm()">+ Apply for Loan</button>
            </div>
        </header>
        <div class="content-wrapper">

            <!-- Apply Loan Form (hidden by default) -->
            <section id="apply-loan-form" style="display:none;background:white;border-radius:1rem;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 1px 4px rgba(0,0,0,.08)">
                <h3 style="margin-bottom:1rem">Loan Application</h3>
                <form onsubmit="handleApplyLoan(event)">
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
                        <div class="form-group">
                            <label>Principal Amount ($)</label>
                            <input type="number" id="loan-principal" placeholder="e.g. 50000" min="1000" required
                                style="width:100%;padding:.6rem;border:1px solid #d1d5db;border-radius:.5rem">
                        </div>
                        <div class="form-group">
                            <label>Term (months)</label>
                            <input type="number" id="loan-term" placeholder="e.g. 36" min="1" max="360" required
                                style="width:100%;padding:.6rem;border:1px solid #d1d5db;border-radius:.5rem">
                        </div>
                        <div class="form-group">
                            <label>Interest Rate (% p.a.)</label>
                            <input type="number" id="loan-rate" placeholder="7.5" step="0.1" min="1" max="30" value="7.5"
                                style="width:100%;padding:.6rem;border:1px solid #d1d5db;border-radius:.5rem">
                        </div>
                        <div class="form-group">
                            <label>Loan Purpose</label>
                            <select id="loan-purpose" style="width:100%;padding:.6rem;border:1px solid #d1d5db;border-radius:.5rem">
                                <option value="">Select purpose</option>
                                <option value="Home Loan">Home Loan</option>
                                <option value="Car Loan">Car Loan</option>
                                <option value="Personal Loan">Personal Loan</option>
                                <option value="Education Loan">Education Loan</option>
                                <option value="Business Loan">Business Loan</option>
                            </select>
                        </div>
                    </div>
                    <p style="color:#6b7280;font-size:.85rem;margin:.75rem 0">
                        ℹ️ Your application will be reviewed by an admin. You will be notified once approved.
                    </p>
                    <div style="display:flex;gap:.75rem">
                        <button type="submit" class="btn-primary">Submit Application</button>
                        <button type="button" class="btn-secondary" onclick="showApplyLoanForm()">Cancel</button>
                    </div>
                </form>
            </section>

            <!-- Loan Summary -->
            <section class="loan-summary">
                <h3>Loan Summary</h3>
                <div class="summary-grid"><!-- filled by JS --></div>
            </section>

            <!-- Active Loans -->
            <section class="loans-section" style="margin-top:1.5rem">
                <h3>My Loans</h3>
                <div class="loans-grid"><!-- loan cards filled by JS --></div>
            </section>

        </div>
    </main>
</div>
<script src="../logicFile.js"></script>
</body>
</html>
